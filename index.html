<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gitの基本コマンドを「状態変化」として直感的に学べる学習サイト。作業フォルダ・ステージング・ローカルリポジトリ・GitHubの動きを目で見て理解できます。" />
  <title>Git Visual Trainer ｜ Gitを“状態の変化”で学ぶ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ===== ヘッダー / ナビゲーション ===== -->
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="#home" data-view="home">
        <span class="brand-mark" aria-hidden="true">⎇</span>
        <span class="brand-text">Git&nbsp;Visual&nbsp;Trainer</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="primaryNav">
        <span class="sr-only">メニューを開閉</span>
        <span class="nav-toggle-bar" aria-hidden="true"></span>
      </button>
      <nav class="primary-nav" id="primaryNav" aria-label="メインメニュー">
        <button class="nav-link" data-view="home">ホーム</button>
        <button class="nav-link" data-view="situations">状況から学ぶ</button>
        <button class="nav-link" data-view="commands">コマンドから学ぶ</button>
        <button class="nav-link" data-view="simulator">シミュレーター</button>
        <button class="nav-link" data-view="quiz">クイズで復習</button>
        <a class="nav-link" href="branch.html">ブランチを学ぶ</a>
        <a class="nav-link" href="team.html">チーム開発</a>
      </nav>
    </div>
  </header>

  <main id="app" class="container" tabindex="-1">
    <!-- 各ビューはJSで表示/非表示を切り替えます -->

    <!-- ===== ホーム ===== -->
    <section class="view" id="view-home" aria-labelledby="home-title"></section>

    <!-- ===== 状況から学ぶ ===== -->
    <section class="view" id="view-situations" aria-labelledby="situations-title" hidden></section>

    <!-- ===== コマンドから学ぶ ===== -->
    <section class="view" id="view-commands" aria-labelledby="commands-title" hidden></section>

    <!-- ===== シミュレーター ===== -->
    <section class="view" id="view-simulator" aria-labelledby="simulator-title" hidden></section>

    <!-- ===== クイズ ===== -->
    <section class="view" id="view-quiz" aria-labelledby="quiz-title" hidden></section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Git Visual Trainer — Gitの基本操作を“状態の変化”で学ぶ学習用サイト</p>
      <p class="muted">本物のGitは動きません。すべて学習用の疑似デモです。</p>
    </div>
  </footer>

  <!-- データ → 各機能 → UI制御 の順に読み込みます -->
  <script src="js/lessons.js"></script>
  <script src="js/simulator.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
