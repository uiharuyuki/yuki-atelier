<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="学習済みのCCNA範囲だけを選択式で復習する問題集。回答後に正解と解説を確認できます。" />
  <title>CCNA 復習問題集 ｜ yuki's atelier</title>
  <link rel="icon" href="../assets/icons/favicon.ico" sizes="any" />
  <link rel="icon" href="../assets/icons/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="CCNA 復習問題集" />
  <meta property="og:url" content="https://uiharuyuki.github.io/yuki-atelier/ccna/" />
  <meta name="theme-color" content="#FBF5E2" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1A1612" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .quiz-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 20px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    .quiz-progress { margin: 0; color: var(--ink-soft); font-weight: 600; }
    .quiz-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .quiz-action {
      min-height: 42px;
      padding: 8px 13px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--paper-deep);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
    }
    .quiz-action:hover { border-color: var(--accent); }
    .question-list { display: grid; gap: 16px; }
    .quiz-card {
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    .quiz-meta { margin: 0 0 6px; color: var(--ink-soft); font-size: .84rem; }
    .quiz-question { margin: 0 0 14px; color: var(--ink-strong); font-size: 1.05rem; line-height: 1.65; }
    .quiz-choices { display: grid; gap: 9px; }
    .quiz-choice {
      width: 100%;
      min-height: 46px;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--paper-deep);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      line-height: 1.5;
      text-align: left;
    }
    .quiz-choice:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-1px); }
    .quiz-choice:disabled { cursor: default; opacity: 1; }
    .quiz-choice.correct { border-color: #4a9d4a; background: #d7f0d7; color: #1a5a1a; }
    .quiz-choice.wrong { border-color: #b04a4a; background: #f5d7d7; color: #7a1a1a; }
    .quiz-result { min-height: 1.5em; margin: 12px 0 0; font-weight: 700; }
    .quiz-result.is-correct { color: #2f7b35; }
    .quiz-result.is-wrong { color: #a13b3b; }
    .quiz-explanation {
      margin-top: 10px;
      padding: 12px 14px;
      border-left: 4px solid var(--accent);
      border-radius: 7px;
      background: var(--paper-deep);
    }
    .quiz-explanation p { margin: 5px 0 0; }
    .review-empty {
      padding: 24px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      color: var(--ink-soft);
      text-align: center;
    }
    .last-answer {
      margin: 0 0 16px;
      padding: 14px 16px;
      border: 1px solid #4a9d4a;
      border-radius: 12px;
      background: var(--paper);
      color: var(--ink);
    }
    .last-answer p { margin: 6px 0 0; }
    @media (prefers-color-scheme: dark) {
      .quiz-choice.correct { background: #18351d; color: #b9e6bd; }
      .quiz-choice.wrong { background: #3a1d1d; color: #efb6b6; }
    }
    @media (max-width: 600px) {
      .quiz-toolbar { align-items: stretch; }
      .quiz-actions { display: grid; width: 100%; grid-template-columns: 1fr 1fr; }
      .quiz-card { padding: 16px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="../index.html">
        <span class="brand-mark brand-mark-image" aria-hidden="true"><img src="../assets/icons/atelier-icon.png" alt="" /></span>
        <span class="brand-text">yuki's atelier</span>
      </a>
      <div class="header-tools">
        <nav class="primary-nav" aria-label="メインメニュー">
          <a class="nav-link" href="../index.html">← atelier</a>
        </nav>
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="テーマ切替" aria-pressed="false">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container" id="app" tabindex="-1">
    <section class="hero">
      <h1 class="hero-title">CCNA 復習問題集</h1>
      <p class="hero-lead">
        momokaとの授業で学んだ範囲だけを、選択式で復習する問題集です。
        選択肢を押すと、正解と解説がその場で表示されます。
      </p>
    </section>

    <section class="home-section" aria-labelledby="current-scope">
      <h2 class="section-title" id="current-scope">現在の収録範囲</h2>
      <p class="section-lead">2026-07-25「ネットワークとは何か」から6問。未学習の範囲は出題しません。</p>

      <div class="quiz-toolbar">
        <p class="quiz-progress" id="quiz-progress" aria-live="polite"></p>
        <div class="quiz-actions">
          <button class="quiz-action" id="review-filter" type="button" aria-pressed="false">要復習だけ表示</button>
          <button class="quiz-action" id="progress-reset" type="button">進捗をリセット</button>
        </div>
      </div>

      <div class="last-answer" id="last-answer" aria-live="polite" hidden></div>
      <div class="question-list" id="question-list"></div>
      <p class="review-empty" id="review-empty" hidden>要復習の問題はありません。全問表示へ戻せます。</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>&copy; yuki's atelier ｜ CCNA 復習問題集</small>
    </div>
  </footer>

  <script src="questions.js"></script>
  <script src="state.js"></script>
  <script src="app.js"></script>
  <script src="../assets/js/theme.js"></script>
</body>
</html>
